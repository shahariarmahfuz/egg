{% extends "layout.html" %}
{% block content %}
<div class="card shadow mb-4">
    <div class="card-header py-3 bg-white">
        <h6 class="m-0 font-weight-bold text-primary">Edit Product</h6>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label text-muted">Product Code</label>
                    <input type="text" class="form-control" value="{{ product.product_code }}" disabled readonly>
                </div>
                <div class="col-md-6">
                    <label for="product_name" class="form-label">Product Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="product_name" name="product_name" required value="{{ product.product_name }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="category" class="form-label">Category</label>
                    <input type="text" class="form-control" id="category" name="category" value="{{ product.category or '' }}">
                </div>
                <div class="col-md-4">
                    <label for="brand" class="form-label">Brand</label>
                    <input type="text" class="form-control" id="brand" name="brand" value="{{ product.brand or '' }}">
                </div>
                <div class="col-md-4">
                    <label for="unit" class="form-label">Unit</label>
                    <select class="form-select form-control" id="unit" name="unit">
                        <option value="Pcs" {% if product.unit == 'Pcs' %}selected{% endif %}>Pcs</option>
                        <option value="Kg" {% if product.unit == 'Kg' %}selected{% endif %}>Kg</option>
                        <option value="Ltr" {% if product.unit == 'Ltr' %}selected{% endif %}>Ltr</option>
                        <option value="Box" {% if product.unit == 'Box' %}selected{% endif %}>Box</option>
                        <option value="Dozen" {% if product.unit == 'Dozen' %}selected{% endif %}>Dozen</option>
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3">
                    <label for="cost_price" class="form-label">Purchase Price</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="cost_price" name="cost_price" value="{{ '%.2f' % product.cost_price }}">
                </div>
                <div class="col-md-3">
                    <label for="selling_price" class="form-label">Selling Price</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="selling_price" name="selling_price" value="{{ '%.2f' % product.selling_price }}">
                </div>
                <div class="col-md-3">
                    <label for="opening_stock" class="form-label">Opening Stock</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="opening_stock" name="opening_stock" value="{{ product.opening_stock }}" disabled readonly title="Cannot change opening stock after creation">
                </div>
                <div class="col-md-3">
                    <label for="min_stock_alert" class="form-label">Minimum Stock Alert</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="min_stock_alert" name="min_stock_alert" value="{{ product.min_stock_alert }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="barcode" class="form-label">Barcode (Optional)</label>
                    <input type="text" class="form-control" id="barcode" name="barcode" value="{{ product.barcode or '' }}">
                </div>
                <div class="col-md-6">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select form-control" id="status" name="status">
                        <option value="Active" {% if product.status == 'Active' %}selected{% endif %}>Active</option>
                        <option value="Inactive" {% if product.status == 'Inactive' %}selected{% endif %}>Inactive</option>
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="2">{{ product.description or '' }}</textarea>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Update Product</button>
            <a href="{{ url_for('product.manage_product') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
