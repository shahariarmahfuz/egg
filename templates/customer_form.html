{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <div class="mb-3 py-3">
        <h6 class="m-0 font-weight-bold text-primary">{{ action }} Customer</h6>
    </div>
    <div class="">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="customer_name" class="form-label">Customer Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="customer_name" name="customer_name" value="{{ customer.customer_name if customer else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label for="contact_number" class="form-label">Contact Number</label>
                    <input type="text" class="form-control" id="contact_number" name="contact_number" value="{{ customer.contact_number if customer else '' }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label for="address" class="form-label">Customer Address</label>
                    <input type="text" class="form-control" id="address" name="address" value="{{ customer.address if customer else '' }}">
                </div>
            </div>
            <div class="row mb-4">
                <div class="col-md-6">
                    <label for="previous_balance" class="form-label">Previous Balance</label>
                    <input type="number" step="0.01" class="form-control" id="previous_balance" name="previous_balance" value="{{ customer.previous_balance if customer else '0' }}">
                </div>
                {% if action == 'Add' %}
                <div class="col-md-6">
                    <label for="date" class="form-label">Date</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Submit</button>
            <a href="{{ url_for('customer.manage_customer') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    if(document.getElementById('date')) {
        document.getElementById('date').valueAsDate = new Date();
    }
</script>
{% endblock %}
