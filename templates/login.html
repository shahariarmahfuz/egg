{% extends "base.html" %}

{% block styles %}
<style>
    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
    }
    
    /* Center the container */
    .container-fluid.pt-4 {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top: 0 !important;
    }

    .login-container {
        width: 100%;
        max-width: 420px;
        padding: 15px;
    }
    .login-card {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        border: none;
        overflow: hidden;
    }
    .login-header {
        background: #ffffff;
        text-align: center;
        padding: 40px 30px 20px;
    }
    .login-header h3 {
        color: #2c3e50;
        font-weight: 700;
        margin-bottom: 8px;
        font-size: 1.5rem;
    }
    .login-header p {
        color: #7f8c8d;
        font-size: 0.95rem;
        margin-bottom: 0;
    }
    .login-body {
        padding: 10px 30px 40px;
    }
    .form-floating > label {
        color: #95a5a6;
    }
    .form-control {
        border-radius: 8px;
        border: 1px solid #e2e8f0;
    }
    .form-control:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 0.25rem rgba(52, 152, 219, 0.15);
    }
    .btn-login {
        background-color: #3498db;
        border-color: #3498db;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: all 0.2s ease-in-out;
    }
    .btn-login:hover {
        background-color: #2980b9;
        border-color: #2980b9;
        transform: translateY(-1px);
    }
    .logo-area {
        margin-bottom: 15px;
    }
    .logo-icon {
        font-size: 2.5rem;
        color: #3498db;
        background: rgba(52, 152, 219, 0.1);
        padding: 20px;
        border-radius: 50%;
    }
</style>
{% endblock %}

{% block login_content %}
<div class="login-container">
    <div class="card login-card">
        <div class="login-header">
            <div class="logo-area">
                <i class="fas fa-chart-pie logo-icon"></i>
            </div>
            <h3>Dashboard Login</h3>
            <p>Welcome back! Please enter your details.</p>
        </div>
        <div class="card-body login-body">
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-floating mb-3">
                    <input class="form-control" id="inputUsername" name="username" type="text" placeholder="Username" required autofocus />
                    <label for="inputUsername"><i class="fas fa-user me-2"></i>Username</label>
                </div>
                <div class="form-floating mb-3">
                    <input class="form-control" id="inputPassword" name="password" type="password" placeholder="Password" required />
                    <label for="inputPassword"><i class="fas fa-lock me-2"></i>Password</label>
                </div>
                <div class="form-check mb-4 mt-2">
                    <input class="form-check-input" type="checkbox" value="1" id="rememberMe" name="remember">
                    <label class="form-check-label text-muted" for="rememberMe">
                        Remember me
                    </label>
                </div>
                <div class="d-grid">
                    <button class="btn btn-primary btn-login btn-lg" type="submit">
                        Sign In <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
