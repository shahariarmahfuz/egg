{% extends "layout.html" %}
{% block content %}
<div class="card shadow mb-4">
    <div class="card-header py-3 bg-white">
        <h6 class="m-0 font-weight-bold text-primary">{{ action }} Daily Expense</h6>
    </div>
    <div class="card-body">
        <form method="POST">
            {% if entry %}
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label text-muted">Invoice No: {{ entry.invoice_no }}</label>
                </div>
            </div>
            {% endif %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="date" name="date" required 
                           value="{{ entry.date.strftime('%Y-%m-%d') if entry else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="expense_head_id" class="form-label">Expense Head <span class="text-danger">*</span></label>
                    <select class="form-select" id="expense_head_id" name="expense_head_id" required>
                        <option value="" disabled {% if not entry %}selected{% endif %}>Select Expense Head</option>
                        {% for head in heads %}
                        <option value="{{ head.id }}" {% if entry and entry.expense_head_id == head.id %}selected{% endif %}>{{ head.head_name }} ({{ head.head_code }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="amount" class="form-label">Amount <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" min="0.01" class="form-control" id="amount" name="amount" required value="{{ entry.amount if entry else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="comment" class="form-label">Comment</label>
                    <input type="text" class="form-control" id="comment" name="comment" value="{{ entry.comment if entry else '' }}">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">{{ action }} Daily Expense</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
            <a href="{{ url_for('expenses.manage_daily_expense') }}" class="btn btn-link">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        {% if not entry %}
        document.getElementById('date').valueAsDate = new Date();
        {% endif %}
    });
</script>
{% endblock %}
